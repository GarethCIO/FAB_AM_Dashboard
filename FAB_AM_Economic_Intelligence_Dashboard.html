<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FAB Asset Management &#8212; Economic Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>:root{--fab-blue:#003B8E;--fab-blue-mid:#1a5db5;--fab-blue-light:#4a84d4;--fab-blue-pale:#dce8f7;--fab-blue-ghost:#f0f5fc;--fab-red:#E3001B;--white:#FFFFFF;--grey-50:#f7f9fc;--grey-100:#edf2fa;--grey-200:#d0daea;--grey-400:#6b82a8;--grey-600:#3d4f6b;--text:#0d2040;--score-out:#00776F;--score-above:#1a5db5;--score-avg:#B0B0B0;--score-below:#C5AA3C;--score-under:#D42B1E;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);min-height:100vh;overflow-x:hidden;}
.header{background:var(--white);border-bottom:3px solid var(--fab-blue);position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,59,142,0.10);}
.header-inner{max-width:1700px;margin:0 auto;display:flex;align-items:center;height:68px;}
.header-logo{padding:0 20px;border-right:1px solid var(--grey-200);height:100%;display:flex;align-items:center;}
.header-logo img{height:38px;width:auto;}
.brand-mark{font-family:'Playfair Display',serif;font-weight:900;font-size:20px;color:var(--fab-blue);}
.header-title{padding:0 20px;flex:1;}
.header-title h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--fab-blue);}
.header-title p{font-size:11px;color:var(--grey-400);margin-top:2px;}
.header-meta{padding:0 20px;text-align:right;font-family:'DM Mono',monospace;font-size:11px;color:var(--grey-400);}
.header-meta span{display:block;color:var(--fab-blue);font-size:12px;font-weight:600;}
.header-pill{display:inline-flex;align-items:center;gap:6px;background:var(--fab-blue);color:#fff;font-size:10px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:.8px;text-transform:uppercase;margin-left:12px;white-space:nowrap;}
.header-pill .dot{width:6px;height:6px;background:var(--fab-red);border-radius:50%;}
.app{max-width:1700px;margin:0 auto;display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 68px);}
.sidebar{background:var(--fab-blue);padding:16px 0;position:sticky;top:68px;height:calc(100vh - 68px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:4px;}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:2px;}
.sidebar-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.45);font-weight:600;padding:14px 18px 5px;}
.region-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 18px;background:none;border:none;color:rgba(255,255,255,.65);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;text-align:left;transition:all .15s;border-left:3px solid transparent;}
.region-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.region-btn.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--fab-red);}
.region-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.region-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.4);}
.country-list{padding:0 8px;}
.country-btn{display:flex;align-items:center;gap:8px;width:100%;padding:5px 10px;background:none;border:none;border-radius:4px;color:rgba(255,255,255,.6);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;text-align:left;transition:all .12s;border-left:2px solid transparent;}
.country-btn:hover{background:rgba(255,255,255,.08);color:#fff;}
.country-btn.active{background:rgba(255,255,255,.14);color:#fff;border-left-color:var(--fab-red);}
.country-code{font-family:'DM Mono',monospace;font-size:10px;color:rgba(255,255,255,.45);background:rgba(255,255,255,.1);padding:1px 5px;border-radius:3px;min-width:26px;text-align:center;}
.country-btn.active .country-code{background:rgba(255,255,255,.2);color:#fff;}
.search-bar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 12px;margin:4px 12px 10px;}
.search-bar input{background:none;border:none;outline:none;color:#fff;font-family:'DM Sans',sans-serif;font-size:12px;width:100%;}
.search-bar input::placeholder{color:rgba(255,255,255,.4);}
.main{padding:20px 24px;background:var(--grey-50);overflow-y:auto;}
.view-controls{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.view-tabs{display:flex;background:var(--white);border:1px solid var(--grey-200);border-radius:6px;padding:3px;gap:2px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,59,142,.06);}
.tab-btn{padding:6px 14px;background:none;border:none;border-radius:4px;color:var(--grey-400);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;transition:all .15s;}
.tab-btn:hover{color:var(--fab-blue);}
.tab-btn.active{background:var(--fab-blue);color:#fff;}
.country-header{display:flex;align-items:center;gap:16px;margin-bottom:18px;padding:14px 18px;background:var(--white);border:1px solid var(--grey-200);border-left:4px solid var(--fab-blue);border-radius:6px;box-shadow:0 1px 6px rgba(0,59,142,.07);}
.country-flag-code{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:var(--fab-blue);min-width:44px;}
.country-info h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--fab-blue);}
.country-info p{font-size:12px;color:var(--grey-400);margin-top:2px;}
.country-badges{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap;}
.badge{padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;font-family:'DM Mono',monospace;}
.badge-gdp{background:var(--fab-blue-pale);border:1px solid var(--fab-blue-light);color:var(--fab-blue);}
.badge-cpi{background:#fdecea;border:1px solid #f5a0a0;color:var(--fab-red);}
.badge-score{background:#e8f5f0;border:1px solid #00776F;color:#00776F;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;margin-bottom:18px;}
.kpi-card{background:var(--white);border:1px solid var(--grey-200);border-radius:6px;padding:12px 14px;border-top:2px solid var(--fab-blue-light);box-shadow:0 1px 4px rgba(0,59,142,.05);}
.kpi-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--grey-400);font-weight:600;margin-bottom:5px;}
.kpi-value{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--fab-blue);line-height:1;}
.kpi-sub{font-size:10px;margin-top:4px;}
.kpi-up{color:#1a7a5c;}.kpi-down{color:var(--fab-red);}.kpi-neutral{color:var(--grey-400);}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.charts-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px;}
.chart-card{background:var(--white);border:1px solid var(--grey-200);border-radius:8px;padding:16px;box-shadow:0 1px 6px rgba(0,59,142,.05);}
.chart-card.full-width{grid-column:1/-1;}
.chart-title{font-size:12px;font-weight:600;color:var(--fab-blue);margin-bottom:3px;}
.chart-subtitle{font-size:10px;color:var(--grey-400);margin-bottom:12px;}
.chart-container{position:relative;height:200px;}
.chart-container.tall{height:280px;}
.chart-container.xtall{height:380px;}
.table-wrapper{border:1px solid var(--grey-200);border-radius:8px;overflow:hidden;margin-bottom:18px;box-shadow:0 1px 6px rgba(0,59,142,.05);}
.table-header-bar{background:var(--fab-blue);padding:11px 16px;display:flex;align-items:center;justify-content:space-between;}
.table-header-bar h3{font-size:12px;font-weight:600;color:#fff;}
.table-header-bar p{font-size:11px;color:rgba(255,255,255,.6);}
table{width:100%;border-collapse:collapse;background:var(--white);}
thead tr{background:var(--fab-blue-ghost);}
th{padding:8px 12px;text-align:right;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--fab-blue);border-bottom:2px solid var(--grey-200);white-space:nowrap;}
th:first-child,th.left{text-align:left;}
th.ac{color:var(--fab-blue-mid);}th.fc{color:var(--fab-red);}th.sc{color:#00776F;}
tbody tr{border-bottom:1px solid var(--grey-100);}
tbody tr:hover{background:var(--fab-blue-ghost);}
td{padding:8px 12px;font-family:'DM Mono',monospace;font-size:11px;text-align:right;color:var(--grey-600);}
td:first-child,td.left{text-align:left;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text);}
td.ac{color:var(--fab-blue-mid);}td.fc{color:var(--fab-blue);}td.na{color:var(--grey-200);font-size:10px;}
td.pos{color:#1a7a5c;font-weight:500;}td.neg{color:var(--fab-red);font-weight:500;}
.score-band{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;white-space:nowrap;}
.band-Outperformer{background:#e8f5f0;color:#00776F;}
.band-Above-Average{background:var(--fab-blue-pale);color:var(--fab-blue-mid);}
.band-Average{background:#f4f4f4;color:#666;}
.band-Below-Average{background:#fef9e7;color:#b8860b;}
.band-Underperformer{background:#fdecea;color:var(--fab-red);}
.score-bar-bg{height:6px;background:var(--grey-100);border-radius:3px;overflow:hidden;margin-top:3px;}
.score-bar{height:100%;border-radius:3px;transition:width .4s ease;}
.radar-card{background:var(--white);border:1px solid var(--grey-200);border-radius:8px;padding:16px;box-shadow:0 1px 6px rgba(0,59,142,.05);}
.radar-container{position:relative;height:300px;max-width:380px;margin:0 auto;}
.hm-container{overflow-x:auto;}
.hm-table{border-collapse:collapse;width:100%;background:var(--white);}
.hm-table th,.hm-table td{padding:6px 9px;font-size:11px;white-space:nowrap;border:1px solid var(--grey-100);text-align:center;}
.hm-table th{background:var(--fab-blue-ghost);color:var(--fab-blue);font-family:'DM Mono',monospace;font-weight:600;font-size:10px;}
.hm-table td:first-child{text-align:left;color:var(--text);font-family:'DM Sans',sans-serif;font-size:11px;min-width:120px;font-weight:500;}
.hm-table tr.rrow td{background:var(--fab-blue);color:#fff;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;}
.mbar-bg{height:3px;background:var(--grey-100);border-radius:2px;margin-top:2px;overflow:hidden;}
.mbar{height:100%;border-radius:2px;}
.footer{padding:12px 18px;border-top:2px solid var(--grey-100);display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--grey-400);background:var(--white);}
.footer span{color:var(--fab-blue);font-family:'DM Mono',monospace;font-weight:600;}
.score-gauge{display:flex;flex-direction:column;align-items:center;padding:16px;}
.score-number{font-family:'DM Mono',monospace;font-size:42px;font-weight:700;color:var(--fab-blue);line-height:1;}
.score-label{font-size:11px;color:var(--grey-400);margin-top:4px;}
.contrib-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--grey-100);}
.contrib-row:last-child{border-bottom:none;}
.contrib-ind{font-size:11px;color:var(--text);min-width:140px;}
.contrib-bar-bg{flex:1;height:8px;background:var(--grey-100);border-radius:4px;overflow:hidden;}
.contrib-bar{height:100%;border-radius:4px;}
.contrib-score{font-family:'DM Mono',monospace;font-size:11px;color:var(--grey-600);min-width:38px;text-align:right;}
.contrib-src{font-size:9px;color:var(--grey-400);min-width:30px;text-align:right;}
.imp-badge{display:inline-block;padding:1px 5px;background:#fef9e7;border:1px solid #e6c200;border-radius:3px;font-size:8px;color:#7a6000;font-weight:600;}
@media(max-width:900px){.app{grid-template-columns:1fr;}.sidebar{position:static;height:auto;}.charts-grid,.charts-grid-3{grid-template-columns:1fr;}}

.cio-page{display:flex;flex-direction:column;gap:18px;}
.cio-hero{background:var(--fab-blue);border-radius:10px;padding:28px 32px;position:relative;overflow:hidden;}
.cio-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.04);}
.cio-hero-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.55);font-weight:600;margin-bottom:8px;}
.cio-hero-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;margin-bottom:6px;max-width:780px;line-height:1.35;}
.cio-hero-sub{font-size:12px;color:rgba(255,255,255,0.65);line-height:1.65;max-width:760px;}
.cio-hero-sub strong{color:#fff;}
.cio-hero-stats{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap;}
.cio-stat{text-align:center;}
.cio-stat-val{font-family:'DM Mono',monospace;font-size:26px;font-weight:700;color:#fff;line-height:1;}
.cio-stat-lbl{font-size:10px;color:rgba(255,255,255,0.55);margin-top:3px;letter-spacing:.5px;}
.cio-stat-val.red{color:#ff8080;}
.cio-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.cio-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;}
.cio-card{background:#fff;border:1px solid var(--grey-200);border-radius:8px;overflow:hidden;box-shadow:0 1px 6px rgba(0,59,142,.05);}
.cio-card-hdr{background:var(--fab-blue);padding:12px 16px;}
.cio-card-hdr h3{font-size:12px;font-weight:600;color:#fff;margin-bottom:1px;}
.cio-card-hdr p{font-size:10px;color:rgba(255,255,255,.6);}
.cio-card-hdr.accent{background:var(--fab-red);}
.cio-card-hdr.light{background:var(--fab-blue-ghost);border-bottom:2px solid var(--fab-blue);}
.cio-card-hdr.light h3{color:var(--fab-blue);}
.cio-card-hdr.light p{color:var(--grey-400);}
.cio-card-body{padding:14px 16px;}
.cio-insight{font-size:12px;color:var(--grey-600);line-height:1.65;margin-bottom:12px;}
.cio-insight:last-child{margin-bottom:0;}
.cio-insight strong{color:var(--fab-blue);font-weight:600;}
.cio-insight .red{color:var(--fab-red);font-weight:600;}
.signal-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--grey-100);}
.signal-row:last-child{border-bottom:none;}
.signal-code{font-family:'DM Mono',monospace;font-size:10px;background:var(--fab-blue-ghost);color:var(--fab-blue);padding:2px 6px;border-radius:3px;min-width:32px;text-align:center;font-weight:600;flex-shrink:0;}
.signal-code.red{background:#fdecea;color:var(--fab-red);}
.signal-code.amber{background:#fef9e7;color:#8a6000;}
.signal-text{font-size:11px;color:var(--grey-600);line-height:1.4;flex:1;}
.signal-text strong{color:var(--text);font-size:12px;}
.signal-meta{text-align:right;flex-shrink:0;}
.signal-score{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;}
.signal-mom{font-family:'DM Mono',monospace;font-size:10px;}
.signal-mom.up{color:#00776F;}.signal-mom.dn{color:var(--fab-red);}
.region-block{padding:9px 0;border-bottom:1px solid var(--grey-100);}
.region-block:last-child{border-bottom:none;}
.region-block-bar{height:5px;background:var(--grey-100);border-radius:3px;overflow:hidden;margin:3px 0;}
.region-block-fill{height:100%;border-radius:3px;}
.region-block-meta{font-size:10px;color:var(--grey-400);}
@media(max-width:1100px){.cio-grid-3{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){.cio-grid-2,.cio-grid-3{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="header-logo"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 95" height="46" role="img" aria-label="First Abu Dhabi Bank">
  <!-- Arabic -->
  <text x="2" y="16" font-family="'Segoe UI',Tahoma,Arial,sans-serif" font-size="13" font-weight="700" fill="#003B8E" letter-spacing="0.3">&#x628;&#x646;&#x643; &#x623;&#x628;&#x648;&#x638;&#x628;&#x64A; &#x627;&#x644;&#x623;&#x648;&#x644;</text>
  <!-- F -->
  <text x="0" y="74" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-size="62" font-weight="900" fill="#003B8E">F</text>
  <!-- A -->
  <text x="48" y="74" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-size="62" font-weight="900" fill="#003B8E">A</text>
  <!-- B -->
  <text x="100" y="74" font-family="'Arial Black','Arial Bold',Arial,sans-serif" font-size="62" font-weight="900" fill="#003B8E">B</text>
  <!-- Red upward arrow: shaft + arrowhead -->
  <g fill="#E3001B">
    <!-- Diagonal shaft -->
    <polygon points="168,72 178,72 200,14 190,14"/>
    <!-- Arrowhead pointing up-right -->
    <polygon points="188,6 208,6 208,26"/>
  </g>
  <!-- English subtitle -->
  <text x="2" y="91" font-family="Arial,sans-serif" font-size="12.5" font-weight="700" font-style="italic" fill="#003B8E" letter-spacing="0.3">First Abu Dhabi Bank</text>
</svg></div>
    <div class="header-title">
      <h1>Economic Intelligence Dashboard</h1>
      <p>Bloomberg Composite Consensus &amp; FAB Macro Health Score &mdash; Q2 2025 through 2027</p>
    </div>
    <div class="header-meta"><span id="udate"></span>58 Countries &#8226; 6 Regions &#8226; 9 Indicators</div>
    <div class="header-pill"><div class="dot"></div>LIVE DATA</div>
  </div>
</header>
<div class="app">
  <aside class="sidebar">
    <div>
      <div class="sidebar-label">View</div>
      <button class="region-btn active" onclick="setView('cio')" id="view-cio"><div class="region-dot" style="background:#fff"></div>CIO Overview</button>
      <button class="region-btn" onclick="setView('scores')" id="view-scores"><div class="region-dot" style="background:#C5AA3C"></div>Macro Health Score</button>
      <button class="region-btn" onclick="setView('global')" id="view-global"><div class="region-dot" style="background:#4a84d4"></div>Global Data</button>
      <button class="region-btn" onclick="setView('heatmap')" id="view-heatmap"><div class="region-dot" style="background:#E3001B"></div>Heatmap</button>
    </div>
    <div><div class="sidebar-label">Regions</div><div id="region-buttons"></div></div>
    <div>
      <div class="sidebar-label">Countries</div>
      <div class="search-bar"><span style="color:rgba(255,255,255,0.4)">&#9906;</span>
        <input type="text" placeholder="Search country..." id="country-search" oninput="filterCountries(this.value)"></div>
      <div class="country-list" id="country-list"></div>
    </div>
  </aside>
  <main class="main" id="main-content"><div id="vc"></div></main>

function getRegions(){return[...new Set(DATA.map(d=>d.region))];}
function byRegion(r){return DATA.filter(d=>d.region===r);}
function gv(c,ind,t){if(!c.indicators[ind])return null;const d=c.indicators[ind];if(t==="curr"){const a=d.actual;return a[3]??a[2]??a[1]??a[0]??null;}if(t==="ann26")return d.ann26;if(t==="ann25")return d.ann25;if(t==="ann27")return d.ann27;return null;}
function scoreFor(country){return SCORE_DATA.countries.find(r=>r.country===country)||null;}
function bandClass(band){return"band-"+band.replace(" ","-");}
function killCharts(){Object.values(CH).forEach(ch=>{try{ch.destroy();}catch(e){}});CH={};}
function clearActive(){document.querySelectorAll(".region-btn,.country-btn,[id^='view-']").forEach(b=>b.classList.remove("active"));}
function setView(v){curView=v;curCountry=null;curRegion=null;clearActive();const el=document.getElementById("view-"+v);if(el)el.classList.add("active");killCharts();renderView(v);}
function setRegionByName(r){curView="region";curCountry=null;curRegion=r;clearActive();document.querySelectorAll("[data-region='"+encodeURIComponent(r)+"']").forEach(b=>b.classList.add("active"));killCharts();renderView("region");}
function setCIdx(idx){curView="country";curCountry=DATA[idx].country;curRegion=null;clearActive();const el=document.getElementById("cnt-"+DATA[idx].code);if(el)el.classList.add("active");killCharts();renderView("country");}
function renderView(v){const c=document.getElementById("vc");if(v==="cio")renderCIO(c);else if(v==="global")renderGlobal(c);else if(v==="region")renderRegion(c);else if(v==="country")renderCountry(c);else if(v==="heatmap")renderHeatmap(c);else if(v==="scores")renderScores(c);}
function buildSidebar(){
  document.getElementById("region-buttons").innerHTML=getRegions().map(r=>`<button class="region-btn" data-region="${encodeURIComponent(r)}" onclick="setRegionByName('${r.replace(/'/g,"\\'")}')"><div class="region-dot" style="background:${REGION_COLORS[r]}"></div>${r}<span class="region-count">${byRegion(r).length}</span></button>`).join("");
  buildCountryList(DATA);
}
function buildCountryList(list){
  document.getElementById("country-list").innerHTML=list.map(c=>{const idx=DATA.indexOf(c);const sc=scoreFor(c.country);return`<button class="country-btn ${curCountry===c.country?"active":""}" onclick="setCIdx(${idx})" id="cnt-${c.code}"><span class="country-code">${c.code}</span>${c.country}</button>`;}).join("");
}
function filterCountries(q){buildCountryList(q?DATA.filter(d=>d.country.toLowerCase().includes(q.toLowerCase())||d.code.toLowerCase().includes(q.toLowerCase())):DATA);}
function indTabs(fn){return`<div class="view-tabs">${Object.keys(INDICATORS).map(k=>`<button class="tab-btn ${k===curInd?"active":""}" onclick="${fn}('${k}')">${INDICATORS[k].label}</button>`).join("")}</div>`;}
function activateTab(ind){document.querySelectorAll(".view-tabs .tab-btn").forEach((b,i)=>{b.classList.toggle("active",Object.keys(INDICATORS)[i]===ind);});}
function cOpts(extra){return Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#6b82a8",font:{size:10},boxWidth:12}}},scales:{x:{ticks:{color:"#6b82a8",font:{size:9}},grid:{color:"rgba(0,59,142,0.06)"}},y:{ticks:{color:"#6b82a8",font:{size:10}},grid:{color:"rgba(0,59,142,0.06)"}}}},extra||{});}

function buildKpis(co,sc){
  const defs=[
    {ind:"GDP",label:"GDP 2026F",val:gv(co,"GDP","ann26"),prev:gv(co,"GDP","ann25")},
    {ind:"CPI",label:"CPI 2026F",val:gv(co,"CPI","ann26"),prev:gv(co,"CPI","curr")},
    {ind:"Policy",label:"Policy Rate",val:gv(co,"Policy","curr"),prev:gv(co,"Policy","ann26")},
    {ind:"Unemp",label:"Unemployment",val:gv(co,"Unemp","curr"),prev:gv(co,"Unemp","ann26")},
    {ind:"CA",label:"Curr Acct 26F",val:gv(co,"CA","ann26"),prev:gv(co,"CA","curr")},
    {ind:"Budget",label:"Budget 2026F",val:gv(co,"Budget","ann26"),prev:gv(co,"Budget","curr")},
    {ind:"Note2Y",label:"2-Year Note",val:gv(co,"Note2Y","curr"),prev:null},
    {ind:"Note10Y",label:"10-Year Note",val:gv(co,"Note10Y","curr"),prev:null}
  ];
  if(sc){defs.unshift({ind:"_score",label:"MHS Score",val:sc.score_current,prev:null,unit:"",isScore:true,band:sc.band});}
  document.getElementById("kpig").innerHTML=defs.filter(k=>k.val!=null).map(k=>{
    const sg=["CA","Budget"].includes(k.ind);
    const vs=k.isScore?k.val.toFixed(1):(sg&&k.val>0?"+":"")+k.val.toFixed(2)+"%";
    const chg=k.prev!=null?k.val-k.prev:null;
    const cl=chg==null?"":chg>0?"kpi-up":chg<0?"kpi-down":"kpi-neutral";
    const cs=chg!=null?(chg>0?"+":"")+chg.toFixed(2)+"pp":"";
    const borderCol=k.isScore?(BAND_COLORS[k.band]||"#003B8E"):INDICATORS[k.ind]?.color||"#4a84d4";
    let extra="";

    return`<div class="kpi-card" style="border-top-color:${borderCol}"><div class="kpi-label">${k.label}</div><div class="kpi-value">${vs}</div>${extra}${cs&&!k.isScore?`<div class="kpi-sub ${cl}">${cs}</div>`:""}</div>`;

}

function buildYields(co){const ctx=document.getElementById("ch-y");if(!ctx)return;const mk=(ind,col,lbl)=>{const d=co.indicators[ind];if(!d)return null;return{label:lbl,data:[...d.actual,...d.fcast],borderColor:col,backgroundColor:"transparent",borderWidth:2,pointRadius:2.5,tension:0.3,spanGaps:true};};const ds=[mk("Rate3M","#4a84d4","3-Month"),mk("Note2Y","#1a5db5","2-Year"),mk("Note10Y","#003B8E","10-Year")].filter(Boolean);if(!ds.length)return;CH["ch-y"]=new Chart(ctx,{type:"line",data:{labels:QLABELS,datasets:ds},options:cOpts()});}
function buildAnnual(co){const ctx=document.getElementById("ch-ann");if(!ctx)return;const inds=["GDP","CPI","Policy","Unemp"];const labels=inds.map(k=>INDICATORS[k].label);const a25=inds.map(k=>gv(co,k,"ann25")),f26=inds.map(k=>gv(co,k,"ann26")),f27=inds.map(k=>gv(co,k,"ann27"));CH["ch-ann"]=new Chart(ctx,{type:"bar",data:{labels,datasets:[{label:"2025A",data:a25,backgroundColor:"#4a84d455",borderColor:"#4a84d4",borderWidth:1},{label:"2026F",data:f26,backgroundColor:"#003B8E88",borderColor:"#003B8E",borderWidth:1},{label:"2027F",data:f27,backgroundColor:"#E3001B55",borderColor:"#E3001B",borderWidth:1}]},options:cOpts()});}
function buildRadar(co){const ctx=document.getElementById("ch-r");if(!ctx)return;const inds=["GDP","CPI","Policy","Unemp","CA","Budget"];const labels=inds.map(k=>INDICATORS[k].label);function pv(t){return inds.map(ind=>{const d=co.indicators[ind];if(!d)return 0;if(t==="curr")return d.actual[3]??d.actual[2]??d.actual[1]??d.actual[0]??0;if(t==="f0")return d.fcast[0]??0;if(t==="f1")return d.fcast[1]??0;return 0;});}const curr=pv("curr"),f0=pv("f0"),f1=pv("f1");function norm(arr){return arr.map((v,i)=>{const all=[curr[i],f0[i],f1[i]].filter(x=>x!=null&&!isNaN(x));const mn=Math.min(...all),mx=Math.max(...all);if(mx===mn)return 50;return Math.max(0,Math.min(100,(v-mn)/(mx-mn)*100));});}CH["ch-r"]=new Chart(ctx,{type:"radar",data:{labels,datasets:[{label:"Current",data:norm(curr),borderColor:"#003B8E",backgroundColor:"rgba(0,59,142,0.12)",borderWidth:2.5,pointRadius:3},{label:"Q2-26",data:norm(f0),borderColor:"#E3001B",backgroundColor:"rgba(227,0,27,0.08)",borderWidth:2,pointRadius:2.5,borderDash:[4,3]},{label:"Q3-26",data:norm(f1),borderColor:"#1a5db5",backgroundColor:"rgba(26,93,181,0.08)",borderWidth:2,pointRadius:2.5,borderDash:[2,3]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#6b82a8",font:{size:10}}}},scales:{r:{ticks:{color:"#6b82a8",backdropColor:"transparent",font:{size:8},stepSize:20},grid:{color:"rgba(0,59,142,0.1)"},pointLabels:{color:"#003B8E",font:{size:10,weight:"600"}},min:0,max:100}}}});}
function buildFull(co){const inds=Object.keys(INDICATORS);const qa=["Q2-25","Q3-25","Q4-25","Q1-26"],qf=["Q2-26","Q3-26","Q4-26","Q1-27"];function td2(v,cl){if(v==null)return`<td class="na">&mdash;</td>`;return`<td class="${cl}">${v.toFixed(2)}</td>`;}document.getElementById("cft").innerHTML=`<div class="table-wrapper"><div class="table-header-bar"><div><h3>Full Data Table &mdash; ${co.country}</h3><p>All indicators | actuals and forecasts</p></div></div><div style="overflow-x:auto"><table><thead><tr><th class="left">Indicator</th>${qa.map(q=>`<th class="ac">${q}</th>`).join("")}<th class="ac">2025A</th>${qf.map(q=>`<th class="fc">${q}</th>`).join("")}<th class="fc">2026F</th><th class="fc">2027F</th></tr></thead><tbody>${inds.map(ind=>{const d=co.indicators[ind];if(!d)return"";const has=[...(d.actual||[]),...(d.fcast||[])].some(v=>v!=null)||d.ann25!=null||d.ann26!=null;if(!has)return"";const ic=INDICATORS[ind];return`<tr><td class="left" style="color:${ic.color};font-size:11px;font-weight:600">${ic.label}<br><span style="color:var(--grey-400);font-size:9px;font-weight:400">${ic.unit}</span></td>${(d.actual||[null,null,null,null]).map(v=>td2(v,"ac")).join("")}${td2(d.ann25,"ac")}${(d.fcast||[null,null,null,null]).map(v=>td2(v,"fc")).join("")}${td2(d.ann26,"fc")}${td2(d.ann27,"fc")}</tr>`;}).join("")}</tbody></table></div></div>`;}

          <div style="height:200px;position:relative"><canvas id="ch-cio-bands"></canvas></div>
          <div style="padding:10px 0 0"><p style="font-size:11px;color:var(--grey-400);line-height:1.65">
            A global mean of <strong style="color:var(--fab-blue)">50.5</strong> and standard deviation of 9.7 reflects a tightly clustered distribution &mdash; 53 of 58 economies sit in the Average band. This compression underscores the necessity of momentum analysis and indicator-level decomposition to differentiate investment signals within the pack. The two outliers &mdash; Bahrain (94.7) and Venezuela (1.8) &mdash; both carry low-confidence flags given significant data imputation.
          </p></div>
        </div>
      </div>
    </div>

    <div class="footer" style="background:#fff;margin-top:4px">
      <div>FAB Asset Management &mdash; CIO Office &mdash; Bloomberg Composite Consensus</div>
      <div><span>FAB Macro Health Score v1.0</span> &bull; 9-indicator weighted framework &bull; 58 countries &bull; 6 regions</div>
    </div>
  </div>`;
  setTimeout(()=>{renderCIOTraj(ctrs);renderCIOMom(ctrs);renderCIOBands(ctrs);},60);
}

function renderCIOTraj(ctrs) {
  const ctx=document.getElementById("ch-cio-traj");if(!ctx)return;
  if(CH["cio-traj"]){CH["cio-traj"].destroy();}
  const byReg={};
  ctrs.forEach(c=>{if(!byReg[c.region])byReg[c.region]=[];byReg[c.region].push({x:c.score_current,y:c.score_forward,label:c.code,r:4});});
  CH["cio-traj"]=new Chart(ctx,{type:"bubble",data:{datasets:Object.entries(byReg).map(([reg,pts])=>([{label:reg,data:pts,backgroundColor:REGION_COLORS[reg]+"99",borderColor:REGION_COLORS[reg],borderWidth:1}])).flat()},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#6b82a8",font:{size:9},boxWidth:10}},tooltip:{callbacks:{label:c=>`${c.raw.label}: ${c.raw.x?.toFixed(1)} → ${c.raw.y?.toFixed(1)}`}}},
      scales:{x:{title:{display:true,text:"Current Score",color:"#6b82a8",font:{size:9}},min:0,max:100,ticks:{color:"#6b82a8",font:{size:9}},grid:{color:"rgba(0,59,142,0.06)"}},
              y:{title:{display:true,text:"Forward Score",color:"#6b82a8",font:{size:9}},min:0,max:100,ticks:{color:"#6b82a8",font:{size:9}},grid:{color:"rgba(0,59,142,0.06)"}}}}
  });
}

function renderCIOMom(ctrs) {
  const ctx=document.getElementById("ch-cio-mom");if(!ctx)return;
  if(CH["cio-mom"]){CH["cio-mom"].destroy();}
  const sorted=[...ctrs].sort((a,b)=>a.score_momentum-b.score_momentum);
  CH["cio-mom"]=new Chart(ctx,{type:"bar",data:{labels:sorted.map(c=>c.code),datasets:[{label:"Momentum",data:sorted.map(c=>c.score_momentum),
    backgroundColor:sorted.map(c=>c.score_momentum>=0?"#00776F88":"#E3001B66"),borderColor:sorted.map(c=>c.score_momentum>=0?"#00776F":"#E3001B"),borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:"#6b82a8",font:{size:7}},grid:{color:"rgba(0,59,142,0.04)"}},y:{ticks:{color:"#6b82a8",font:{size:9}},grid:{color:"rgba(0,59,142,0.06)"}}}}
  });
}

function renderCIOBands(ctrs) {
  const ctx=document.getElementById("ch-cio-bands");if(!ctx)return;
  if(CH["cio-bands"]){CH["cio-bands"].destroy();}
  const bands=["Outperformer","Above Average","Average","Below Average","Underperformer"];
  const BC2={Outperformer:"#00776F","Above Average":"#1A5DB5",Average:"#B0B0B0","Below Average":"#C5AA3C",Underperformer:"#E3001B"};
  const counts=bands.map(b=>ctrs.filter(c=>c.band===b).length);
  CH["cio-bands"]=new Chart(ctx,{type:"bar",data:{labels:bands,datasets:[{data:counts,backgroundColor:bands.map(b=>BC2[b]+"BB"),borderColor:bands.map(b=>BC2[b]),borderWidth:1}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} countries`}}},
      scales:{x:{ticks:{color:"#6b82a8",font:{size:9}},grid:{color:"rgba(0,59,142,0.04)"}},y:{ticks:{color:"#6b82a8",font:{size:9}},grid:{color:"rgba(0,59,142,0.06)"},title:{display:true,text:"Countries",color:"#6b82a8",font:{size:9}}}}}
  });
}

</script>
</body></html>
